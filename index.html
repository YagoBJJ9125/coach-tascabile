/* ---------- util ---------- */
const round = (n) => Math.round(n);
const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
const norm = (s) => (s || "").trim().toLowerCase();
const todayKey = () => new Date().toISOString().slice(0, 10);
const fmtDate = (iso) => new Date(iso + "T00:00:00").toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" });
const fmtEur = (n) => (Math.round(n * 100) / 100).toFixed(2).replace(".", ",") + " €";

const WORKOUT_TYPES = {
  forza: { label: "Forza / Pesi", met: 5.5, emoji: "🏋️" },
  cardio: { label: "Cardio", met: 7.5, emoji: "🏃" },

};
const INTENSITY = { bassa: 0.85, media: 1.0, alta: 1.2 };
const FOOD_CATS = ["verdura", "frutta", "carne", "pesce", "latticini", "cereali", "dispensa", "bevande", "altro"];
const CAT_EMOJI = { verdura: "🥦", frutta: "🍎", carne: "🥩", pesce: "🐟", latticini: "🧀", cereali: "🌾", dispensa: "🫙", bevande: "🧃", altro: "🛒" };
const UNITS = ["pz", "g", "kg", "ml", "l", "conf"];

/* ---------- motore ---------- */
function calcBurn(w, weightKg) {
  const t = WORKOUT_TYPES[w.type]; if (!t) return 0;
  const f = INTENSITY[w.intensity] ?? 1;
  return round(t.met * f * weightKg * (w.duration / 60));
}
function nutritionPlan(profile, todaysWorkouts) {
  const { sex, age, weight, height, activity, goal } = profile;
  if (!weight || !height || !age) return null;
  const bmr = 10 * weight + 6.25 * height - 5 * age + (sex === "donna" ? -161 : 5);
  const actFactor = { sedentario: 1.2, leggero: 1.375, moderato: 1.55, intenso: 1.725 }[activity] ?? 1.375;
  const baseTdee = bmr * actFactor;
  const burnedToday = todaysWorkouts.reduce((s, w) => s + calcBurn(w, weight), 0);
  const burnAdj = round(burnedToday * 0.5);
  const goalAdj = { dimagrire: -400, mantenere: 0, aumentare: 320 }[goal] ?? 0;
  let target = round(baseTdee + burnAdj + goalAdj);
  const floor = sex === "donna" ? 1300 : 1550;
  const flooredAtMin = target < floor; if (flooredAtMin) target = floor;
  const trainedStrength = todaysWorkouts.some((w) => w.type === "forza");
  const trainedHard = todaysWorkouts.some((w) => ["hiit", "cardio", "sport"].includes(w.type) && w.intensity === "alta");
  const restDay = todaysWorkouts.length === 0;
  let protPerKg = 1.8;
  if (trainedStrength) protPerKg = 2.0;
  if (goal === "dimagrire") protPerKg = Math.max(protPerKg, 2.0);
  if (goal === "aumentare" && trainedStrength) protPerKg = 2.1;
  const proteinG = round(protPerKg * weight);
  const fatG = round(Math.max(0.8 * weight, (target * 0.22) / 9));
  const carbsKcal = Math.max(target - proteinG * 4 - fatG * 9, target * 0.2);
  const carbsG = round(carbsKcal / 4);
  return { bmr: round(bmr), baseTdee: round(baseTdee), burnedToday, target, proteinG, carbsG, fatG, flooredAtMin, trainedStrength, trainedHard, restDay };
}
function coachMessage(plan, profile, todaysWorkouts, weightTrend, sleepHrs) {
  if (!plan) return "Completa il profilo per ricevere i consigli su misura.";
  const goal = profile.goal; const parts = [];
  if (plan.restDay) parts.push("Oggi è giorno di recupero: tieni alte le proteine e modera i carboidrati.");
  else if (plan.trainedStrength) parts.push(`Hai allenato la forza: priorità alle proteine (${plan.proteinG} g) e carboidrati attorno all'allenamento.`);
  else if (plan.trainedHard) parts.push("Sessione intensa: reintegra i carboidrati per ricaricare le energie, specie nel post-workout.");
  else parts.push("Allenamento leggero: alimentazione bilanciata, niente eccessi.");
  if (plan.burnedToday > 0) parts.push(`Stima di ~${plan.burnedToday} kcal bruciate oggi: il target è già adeguato.`);
  if (sleepHrs != null && sleepHrs > 0) {
    if (sleepHrs < 6) parts.push(`😴 Solo ${sleepHrs} h di sonno: il recupero ne risente, cura proteine e idratazione.`);
    else if (sleepHrs < 7) parts.push(`Hai dormito ${sleepHrs} h, un po' poco: occhio a energia e recupero.`);
    else if (sleepHrs <= 9) parts.push(`Sonno di ${sleepHrs} h: ottimo per recuperare.`);
  }
  if (weightTrend && Math.abs(weightTrend.perWeek) > 0.001) {
    const pw = weightTrend.perWeek;
    if (goal === "dimagrire") {
      if (pw <= -0.012 * profile.weight) parts.push("⚠️ Stai calando in fretta: valuta di alzare un po' le calorie.");
      else if (pw < 0) parts.push("Dimagrimento sano in corso. Continua così.");
      else parts.push("Il peso non scende: rivedi le porzioni o aumenta l'attività.");
    } else if (goal === "aumentare") {
      if (pw > 0) parts.push("Crescita di peso coerente con l'obiettivo.");
      else parts.push("Per crescere servono più calorie: aggiungi uno spuntino.");
    }
  }
  return parts.join(" ");
}
function mealBreakdown(plan, dailyCost = 0) {
  if (!plan) return [];
  const splits = [
    { name: "Colazione", kc: 0.22, ex: "Avena, yogurt greco, frutta, uova" },
    { name: "Spuntino di metà mattina", kc: 0.10, ex: "Frutta + frutta secca, o uno yogurt proteico" },
    { name: "Pranzo", kc: 0.30, ex: "Riso/pasta integrale, carne magra o legumi, verdura, olio EVO" },
    { name: "Spuntino pre-allenamento", kc: 0.13, ex: "Pane integrale o frutta + proteina leggera, 1-1,5 h prima" },
    { name: "Cena", kc: 0.25, ex: "Pesce o pollo, patate o pane integrale, verdura" },
  ];
  return splits.map((s) => ({ ...s, kcal: round(plan.target * s.kc), p: round(plan.proteinG * s.kc), c: round(plan.carbsG * s.kc), f: round(plan.fatG * s.kc), cost: dailyCost > 0 ? dailyCost * s.kc : 0 }));
}
function sleepHoursFrom(asleep, wake) {
  if (!asleep || !wake) return 0;
  const p = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + (m || 0); };
  let d = p(wake) - p(asleep); if (d <= 0) d += 1440;
  return Math.round((d / 60) * 4) / 4;
}
function sleepStats(sleepLog, goal = 8) {
  if (!sleepLog || !sleepLog.length) return null;
  const sorted = [...sleepLog].sort((a, b) => a.date.localeCompare(b.date));
  const last7 = sorted.slice(-7), last3 = sorted.slice(-3);
  const avg = (arr) => arr.reduce((s, x) => s + x.hours, 0) / arr.length;
  const avg7 = +avg(last7).toFixed(1), avg3 = +avg(last3).toFixed(1);
  const debt = +last7.reduce((s, x) => s + Math.max(0, goal - x.hours), 0).toFixed(1);
  const surplus = +last7.reduce((s, x) => s + Math.max(0, x.hours - goal), 0).toFixed(1);
  const net = +(surplus - debt).toFixed(1);
  const mad = last7.reduce((s, x) => s + Math.abs(x.hours - avg7), 0) / last7.length;
  const regularity = clamp(Math.round(100 - mad * 40), 0, 100);
  return { nights: sleepLog.length, avg7, avg3, debt, surplus, net, regularity };
}
function readiness(sleepLog, workouts, goal = 8) {
  const stats = sleepStats(sleepLog, goal); if (!stats) return null;
  const sleepComp = clamp(Math.round(((stats.avg3 - 4) / (goal - 4)) * 100), 0, 100);
  const debtPen = Math.min(25, Math.round(stats.debt * 3));
  const cut = new Date(); cut.setDate(cut.getDate() - 2);
  const recent = (workouts || []).filter((w) => new Date(w.date + "T00:00:00") >= cut);
  const hard = recent.filter((w) => w.intensity === "alta" || w.type === "hiit").length;
  const minutes = recent.reduce((s, w) => s + w.duration, 0);
  const loadPen = Math.min(25, hard * 12 + (minutes > 120 ? 8 : 0));
  const score = clamp(sleepComp - debtPen - loadPen, 0, 100);
  let level, advice, color;
  if (score >= 75) { level = "Pronto"; color = T.mint; advice = "Via libera: oggi puoi spingere su intensità o carico."; }
  else if (score >= 50) { level = "Moderato"; color = T.amber; advice = "Meglio intensità media con un buon defaticamento."; }
  else { level = "Recupero"; color = "#ff6b6b"; advice = "Sotto recupero: oggi mobilità, cardio leggero o riposo."; }
  return { score, level, advice, color, debtPen, loadPen, stats };
}
function isLow(it) {
  const q = it.qty;
  switch (it.unit) {
    case "pz": case "conf": return q <= 1;
    case "g": return q <= 100; case "kg": return q <= 0.15;
    case "ml": return q <= 200; case "l": return q <= 0.25; default: return false;
  }
}
function itemServings(it) {
  const n = norm(it.name);
  const isEgg = /uov/.test(n); const isLegume = /fagiol|cec|lentic|legum|pisell|soia/.test(n);
  const cat = it.category;
  const protein = cat === "carne" || cat === "pesce" || isEgg || isLegume;
  const carb = cat === "cereali" || /pane|pasta|ris\b|riso|patat|avena|farro|orzo|couscous|gnocch/.test(n);
  const veg = cat === "verdura";
  let gr = null; if (it.unit === "g") gr = it.qty; else if (it.unit === "kg") gr = it.qty * 1000;
  const count = (it.unit === "pz" || it.unit === "conf") ? it.qty : null;
  let servings = 0;
  if (isEgg && count != null) servings = count / 2;
  else if (count != null) servings = count;
  else if (gr != null) { const base = protein ? 150 : carb ? 80 : veg ? 120 : 150; servings = gr / base; }
  return { protein, carb, veg, servings };
}
function estimateCoverage(fridge) {
  let prot = 0, carb = 0, veg = 0;
  fridge.forEach((it) => { const s = itemServings(it); if (s.protein) prot += s.servings; if (s.carb) carb += s.servings; if (s.veg) veg += s.servings; });
  return { mainMeals: Math.floor(prot), prot, carb, veg };
}
function avgServingPrice(fridge) {
  let val = 0, serv = 0;
  fridge.forEach((it) => { if (it.unitPrice > 0) { const s = itemServings(it); if (s.servings > 0 && (s.protein || s.carb || s.veg)) { val += it.unitPrice * it.qty; serv += s.servings; } } });
  return serv > 0 ? val / serv : 0;
}
function dailyFoodCost(fridge) { const a = avgServingPrice(fridge); return a > 0 ? a * 5 : 0; }

/* ---------- DATA (Supabase) ---------- */
async function loadAll() {
  const [p, w, wl, sl, fr] = await Promise.all([
    sb.from("profiles").select("*").maybeSingle(),
    sb.from("workouts").select("*").order("created_at", { ascending: false }),
    sb.from("weights").select("*"),
    sb.from("sleep_logs").select("*"),
    sb.from("fridge_items").select("*").order("created_at", { ascending: false }),
  ]);
  const profile = p.data ? {
    name: p.data.name || "", age: p.data.age || "", sex: p.data.sex || "uomo",
    weight: p.data.weight || "", height: p.data.height || "", activity: p.data.activity || "leggero",
    goal: p.data.goal || "mantenere", goalWeight: p.data.goal_weight || "", sleepGoal: p.data.sleep_goal ?? 8,
  } : null;
  return {
    profile,
    workouts: (w.data || []).map((x) => ({ id: x.id, date: x.date, type: x.type, duration: x.duration, intensity: x.intensity })),
    weights: (wl.data || []).map((x) => ({ date: x.date, weight: Number(x.weight) })),
    sleep: (sl.data || []).map((x) => ({ date: x.date, asleep: x.asleep, wake: x.wake, hours: Number(x.hours) })),
    fridge: (fr.data || []).map((x) => ({ id: x.id, name: x.name, qty: Number(x.qty), unit: x.unit, category: x.category, unitPrice: Number(x.unit_price) || 0 })),
  };
}

}
function Donut({ p, c, f, size = 168 }) {
  const kp = p * 4, kc = c * 4, kf = f * 9, tot = kp + kc + kf || 1;
  const r = size / 2 - 14, cx = size / 2, cy = size / 2, C = 2 * Math.PI * r;
  const segs = [{ v: kp / tot, col: T.blue }, { v: kc / tot, col: T.amber }, { v: kf / tot, col: T.violet }];
  let off = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={T.surface2} strokeWidth="14" />
      {segs.map((s, i) => { const len = s.v * C; const el = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.col} strokeWidth="14" strokeDasharray={`${len} ${C - len}`} strokeDashoffset={-off} />; off += len; return el; })}
    </svg>
  );
}
function MiniLine({ points, color, goal, yMin, yMax, unit }) {
  if (!points || points.length < 2) return null;
  const W = 320, H = 150, pad = 26;
  const vs = points.map((p) => p.v);
  let mn = yMin != null ? yMin : Math.min(...vs), mx = yMax != null ? yMax : Math.max(...vs);
  if (mn === mx) { mn -= 1; mx += 1; }
  const x = (i) => pad + (i * (W - 2 * pad)) / (points.length - 1);
  const y = (v) => H - pad - ((v - mn) / (mx - mn)) * (H - 2 * pad);
  const d = points.map((p, i) => `${i ? "L" : "M"}${x(i).toFixed(1)} ${y(p.v).toFixed(1)}`).join(" ");
  const idxs = [0, Math.floor((points.length - 1) / 2), points.length - 1];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 150 }}>
      {goal != null && goal >= mn && goal <= mx && <line x1={pad} x2={W - pad} y1={y(goal)} y2={y(goal)} stroke={T.mint} strokeDasharray="4 4" strokeWidth="1" />}
      <path d={d} fill="none" stroke={color} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
      {points.map((p, i) => <circle key={i} cx={x(i)} cy={y(p.v)} r="3" fill={color} />)}
      {idxs.map((i) => <text key={i} x={x(i)} y={H - 6} fill={T.mut} fontSize="10" textAnchor="middle">{points[i].label}</text>)}
    </svg>
  );
}

/* ---------- AUTH ---------- */
function Auth() {

  const [email, setEmail] = useState(""); const [pw, setPw] = useState("");
  const [err, setErr] = useState(""); const [busy, setBusy] = useState(false); const [info, setInfo] = useState("");
  const go = async () => {
    setErr(""); setInfo(""); setBusy(true);
    try {
      if (mode === "signup") {
        const { data, error } = await sb.auth.signUp({ email, password: pw });
        if (error) throw error;
        if (!data.session) setInfo("Account creato. Se richiesto, conferma la mail e poi accedi.");
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password: pw });
        if (error) throw error;
      }
    } catch (e) { setErr(e.message || "Errore"); } finally { setBusy(false); }
  };
  return (

      <div style={{ fontSize: 12, color: T.amber, fontWeight: 700, letterSpacing: 1 }}>COACH TASCABILE</div>

        {err && <div style={{ color: "#ff9b9b", fontSize: 12.5, marginBottom: 10 }}>{err}</div>}

        <button onClick={go} disabled={busy || !email || pw.length < 6} style={{ ...btnPrimary, opacity: busy || !email || pw.length < 6 ? .5 : 1 }}>
          {busy ? "Attendi…" : mode === "login" ? "Entra" : "Registrati"}

      </Card>
      <div style={{ textAlign: "center", marginTop: 14, fontSize: 13, color: T.mut }}>
        {mode === "login" ? "Non hai un account? " : "Hai già un account? "}

          {mode === "login" ? "Registrati" : "Accedi"}
        </span>

  );
}

function Progressi({ weightLog, saveWeight, sleepLog, saveSleep, workouts, profile }) {
  const [val, setVal] = useState("");
  const todaySleep = (sleepLog || []).find((s) => s.date === todayKey());
  const [asleep, setAsleep] = useState(todaySleep?.asleep || "23:00");
  const [wake, setWake] = useState(todaySleep?.wake || "07:00");
  const addW = async () => { const n = parseFloat(String(val).replace(",", ".")); if (!n || n < 25 || n > 350) return; await saveWeight(todayKey(), n); setVal(""); };
  const saveS = async () => { const hours = sleepHoursFrom(asleep, wake); if (!hours) return; await saveSleep({ date: todayKey(), asleep, wake, hours }); };
  const wData = useMemo(() => [...weightLog].sort((a, b) => a.date.localeCompare(b.date)).map((w) => ({ v: w.weight, label: new Date(w.date + "T00:00:00").toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit" }) })), [weightLog]);
  const sData = useMemo(() => [...(sleepLog || [])].sort((a, b) => a.date.localeCompare(b.date)).map((s) => ({ v: s.hours, label: new Date(s.date + "T00:00:00").toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit" }) })), [sleepLog]);
  const trend = useMemo(() => { if (weightLog.length < 2) return null; const s = [...weightLog].sort((a, b) => a.date.localeCompare(b.date)); return { first: s[0].weight, last: s[s.length - 1].weight, diff: +(s[s.length - 1].weight - s[0].weight).toFixed(1) }; }, [weightLog]);
  const sGoal = Number(profile.sleepGoal) || 8;
  const sStats = useMemo(() => sleepStats(sleepLog, sGoal), [sleepLog, sGoal]);
  const last7 = useMemo(() => { const cut = new Date(); cut.setDate(cut.getDate() - 7); const list = workouts.filter((w) => new Date(w.date) >= cut); return { count: list.length, min: list.reduce((s, w) => s + w.duration, 0), burn: list.reduce((s, w) => s + calcBurn(w, profile.weight), 0) }; }, [workouts, profile.weight]);
  return (
    <div style={{ padding: "26px 16px 8px" }}>
      <h1 style={H1}>Progressi</h1>
      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        <Chip color={T.amber} label="SESSIONI / 7gg" value={last7.count} unit="" />
        <Chip color={T.mint} label="MINUTI" value={last7.min} unit="min" />
        <Chip color={T.blue} label="ENERGIA" value={last7.burn} unit="kcal" />
      </div>
      <Card>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>Peso corporeo</div>
        {trend && <div style={{ fontSize: 12, color: T.mut, marginBottom: 10 }}>{trend.first} → <b style={{ color: T.text }}>{trend.last} kg</b> <span style={{ color: trend.diff < 0 ? T.mint : trend.diff > 0 ? T.amber : T.mut }}>({trend.diff > 0 ? "+" : ""}{trend.diff} kg)</span></div>}
        {wData.length >= 2 ? <MiniLine points={wData} color={T.amber} goal={profile.goalWeight ? Number(profile.goalWeight) : null} /> : <div style={{ fontSize: 13, color: T.mut, padding: "12px 0" }}>Registra il peso per almeno due giorni per vedere l'andamento.</div>}
        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
          <input value={val} onChange={(e) => setVal(e.target.value)} inputMode="decimal" placeholder="es. 74.5" style={{ ...input, flex: 1, marginBottom: 0 }} />
          <button onClick={addW} style={{ ...btnPrimary, width: "auto", padding: "0 18px" }}>Registra</button>
        </div>
      </Card>
      <Card style={{ marginTop: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <div style={{ fontSize: 13, fontWeight: 700 }}>Sonno</div>
          {todaySleep && <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, color: todaySleep.hours < 6 ? "#ff9b9b" : T.mint }}>{todaySleep.hours} h stanotte</div>}
        </div>
        {sStats && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, margin: "10px 0 6px" }}>
            <SleepStat label="Media 7 notti" value={`${sStats.avg7} h`} color={sStats.avg7 >= sGoal ? T.mint : T.amber} />
            <SleepStat label={`Bilancio vs ${sGoal} h`} value={`${sStats.net > 0 ? "+" : ""}${sStats.net} h`} color={sStats.net >= 0 ? T.mint : "#ff9b9b"} />
            <SleepStat label="Debito (7 gg)" value={sStats.debt > 0 ? `−${sStats.debt} h` : "0 h"} color={sStats.debt > 0 ? "#ff9b9b" : T.mint} />
            <SleepStat label="Regolarità" value={`${sStats.regularity}%`} color={sStats.regularity >= 70 ? T.mint : T.amber} />
          </div>
        )}
        {sData.length >= 2 ? <MiniLine points={sData} color={T.mint} goal={8} yMin={0} yMax={12} /> : <div style={{ fontSize: 12.5, color: T.mut, padding: "8px 0" }}>Registra il sonno per vedere l'andamento.</div>}
        <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
          <div style={{ flex: 1 }}><label style={lbl}>Addormentato</label><input type="time" value={asleep} onChange={(e) => setAsleep(e.target.value)} style={{ ...input, marginBottom: 0 }} /></div>

        </div>
        <div style={{ fontSize: 12, color: T.mut, margin: "8px 2px 12px" }}>Durata: <b style={{ color: T.text }}>{sleepHoursFrom(asleep, wake)} h</b></div>
        <button onClick={saveS} style={btnPrimary}>{todaySleep ? "Aggiorna sonno di oggi" : "Registra sonno di oggi"}</button>
      </Card>
    </div>
  );
}

      <h1 style={H1}>Il mio frigo</h1>
      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
        <button onClick={aiSoon} style={{ ...btnGhost, flex: 1, padding: 14 }}>📷 Scansiona <span style={{ color: T.mut }}>(passo 3)</span></button>
        <button onClick={() => setManual((m) => !m)} style={{ ...btnPrimary, width: "auto", flex: 1 }}>{manual ? "Chiudi" : "+ Aggiungi"}</button>
      </div>
      {manual && <ManualAdd onAdd={async (it) => { await addFridgeItem(it); setManual(false); }} />}
      <Card style={{ marginBottom: 14, background: "linear-gradient(160deg,#22272f,#1a1d23)" }}>
        <div style={{ fontSize: 13.5, fontWeight: 700, marginBottom: 4 }}>Cosa posso cucinare?</div>
        <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 12, lineHeight: 1.5 }}>I piatti su misura con l'AI arrivano al passo 3. Intanto il frigo tiene già il conto di scorte e costi.</div>
        <button onClick={aiSoon} style={{ ...btnPrimary, opacity: .85 }}>✨ Proponi un piatto (passo 3)</button>
      </Card>
      {fridge.length > 0 && (
        <Card style={{ marginBottom: 14, borderLeft: `3px solid ${coverage.mainMeals <= 1 ? "#ff6b6b" : T.mint}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 13.5, fontWeight: 700 }}>Scorte e spesa</div>
            <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, color: coverage.mainMeals <= 1 ? "#ff9b9b" : T.mint }}>~{coverage.mainMeals} {coverage.mainMeals === 1 ? "pasto" : "pasti"}</div>
          </div>
          <div style={{ fontSize: 12.5, color: T.mut, lineHeight: 1.5, marginBottom: shopping.length ? 12 : 0 }}>
            {coverage.mainMeals <= 0 ? "Proteine finite: solo piatti leggeri." : `Proteine per circa ${coverage.mainMeals} pasti principali.`}
            {coverage.carb < 1 ? " Mancano i carboidrati." : ""}{coverage.veg < 1 ? " Manca la verdura." : ""}
          </div>
          {shopping.length > 0 && <><div style={{ fontSize: 11, color: T.mut, fontWeight: 700, marginBottom: 8 }}>DA COMPRARE</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{shopping.map((s, i) => <span key={i} style={{ fontSize: 12, padding: "6px 11px", borderRadius: 999, border: `1px solid ${T.line}`, background: s.kind === "low" ? "rgba(255,122,61,.13)" : "rgba(255,107,107,.12)", color: s.kind === "low" ? T.amber : "#ff9b9b" }}>{s.text}</span>)}</div></>}
        </Card>
      )}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "4px 4px 10px" }}><div style={{ fontSize: 13, fontWeight: 700 }}>In dispensa</div><div style={{ fontSize: 12, color: T.mut }}>{fridge.length} alimenti</div></div>
      {fridge.length === 0 ? <div style={{ textAlign: "center", color: T.mut, padding: 36, fontSize: 13 }}>Frigo vuoto. Aggiungi a mano.</div> :
        grouped.map(([cat, list]) => (
          <div key={cat} style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11.5, color: T.mut, marginBottom: 4, paddingLeft: 4, textTransform: "capitalize" }}>{CAT_EMOJI[cat]} {cat}</div>
            <Card style={{ padding: "4px 14px" }}>
              {list.map((x) => (
                <div key={x.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderTop: `1px solid ${T.line}` }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 500, display: "flex", alignItems: "center", gap: 6 }}>{x.name}{isLow(x) && <span style={{ fontSize: 9, fontWeight: 700, color: T.amber, background: "rgba(255,122,61,.15)", padding: "2px 6px", borderRadius: 6 }}>SCORTA BASSA</span>}</div>
                    {x.unitPrice > 0 && <div style={{ fontSize: 10.5, color: T.mut, marginTop: 2 }}>{fmtEur(x.unitPrice)}/{x.unit}</div>}
                  </div>
                  <button onClick={() => updateFridgeQty(x.id, x.unit === "pz" || x.unit === "conf" ? -1 : -50)} style={qtyBtn}>−</button>
                  <div style={{ minWidth: 56, textAlign: "center", fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13.5 }}>{x.qty}<span style={{ fontSize: 11, color: T.mut }}> {x.unit}</span></div>
                  <button onClick={() => updateFridgeQty(x.id, x.unit === "pz" || x.unit === "conf" ? 1 : 50)} style={qtyBtn}>+</button>
                  <button onClick={() => removeFridge(x.id)} style={{ ...qtyBtn, color: "#ff6b6b", border: "none", background: "none" }}>✕</button>
                </div>
              ))}
            </Card>
          </div>
        ))}
    </div>
  );
}

/* ---------- NAV ---------- */
function Nav({ tab, setTab }) {
  const items = [{ id: "oggi", label: "Oggi", icon: "◎" }, { id: "allen", label: "Allena", icon: "🏋" }, { id: "frigo", label: "Frigo", icon: "🧊" }, { id: "prog", label: "Prog.", icon: "📈" }, { id: "profilo", label: "Profilo", icon: "☰" }];
  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, display: "flex", justifyContent: "center" }}>
      <div style={{ maxWidth: 460, width: "100%", display: "flex", background: "rgba(20,22,26,.92)", backdropFilter: "blur(12px)", borderTop: `1px solid ${T.line}` }}>
        {items.map((it) => { const on = tab === it.id; return <button key={it.id} onClick={() => setTab(it.id)} style={{ flex: 1, background: "none", border: "none", padding: "11px 4px 16px", cursor: "pointer", color: on ? T.amber : T.mut }}><div style={{ fontSize: 19, marginBottom: 3 }}>{it.icon}</div><div style={{ fontSize: 10.5, fontWeight: on ? 700 : 500 }}>{it.label}</div></button>; })}
      </div>
    </div>
  );
}

/* ---------- APP ---------- */
function App() {
  const [session, setSession] = useState(null);
  const [booting, setBooting] = useState(true);
  const [tab, setTab] = useState("oggi");
  const [profile, setProfile] = useState(null);
  const [workouts, setWorkouts] = useState([]);
  const [weights, setWeights] = useState([]);
  const [sleepLog, setSleepLog] = useState([]);
  const [fridge, setFridge] = useState([]);
  const [dataReady, setDataReady] = useState(false);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setBooting(false); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  const uid = session?.user?.id;

  const refresh = async () => { const d = await loadAll(); setProfile(d.profile); setWorkouts(d.workouts); setWeights(d.weights); setSleepLog(d.sleep); setFridge(d.fridge); setDataReady(true); };
  useEffect(() => { if (uid) { setDataReady(false); refresh(); } else { setProfile(null); setWorkouts([]); setWeights([]); setSleepLog([]); setFridge([]); setDataReady(false); } }, [uid]);

  const saveProfile = async (pr) => { await sb.from("profiles").upsert({ user_id: uid, name: pr.name, age: pr.age ? Number(pr.age) : null, sex: pr.sex, weight: pr.weight ? Number(pr.weight) : null, height: pr.height ? Number(pr.height) : null, activity: pr.activity, goal: pr.goal, goal_weight: pr.goalWeight ? Number(pr.goalWeight) : null, sleep_goal: pr.sleepGoal ? Number(pr.sleepGoal) : 8, updated_at: new Date().toISOString() }); await refresh(); };
  const addWorkout = async (w) => { await sb.from("workouts").insert({ date: w.date, type: w.type, duration: w.duration, intensity: w.intensity }); await refresh(); };
  const delWorkout = async (id) => { await sb.from("workouts").delete().eq("id", id); await refresh(); };
  const saveWeight = async (date, weight) => { await sb.from("weights").upsert({ user_id: uid, date, weight }, { onConflict: "user_id,date" }); await refresh(); };
  const saveSleep = async (r) => { await sb.from("sleep_logs").upsert({ user_id: uid, date: r.date, asleep: r.asleep, wake: r.wake, hours: r.hours }, { onConflict: "user_id,date" }); await refresh(); };
  const addFridgeItem = async (it) => {
    const ex = fridge.find((x) => norm(x.name) === norm(it.name) && x.unit === it.unit);
    if (ex) {
      let up = ex.unitPrice || 0; const nup = Number(it.unitPrice) || 0;
      if (ex.unitPrice > 0 && nup > 0) up = (ex.qty * ex.unitPrice + it.qty * nup) / (ex.qty + it.qty); else if (nup > 0) up = nup;
      await sb.from("fridge_items").update({ qty: +(ex.qty + it.qty).toFixed(2), unit_price: +up.toFixed(4) }).eq("id", ex.id);
    } else {
      await sb.from("fridge_items").insert({ name: it.name, qty: it.qty, unit: it.unit, category: it.category || "altro", unit_price: Number(it.unitPrice) || 0 });
    }
    await refresh();
  };
  const updateFridgeQty = async (id, delta) => { const it = fridge.find((x) => x.id === id); if (!it) return; const q = +(it.qty + delta).toFixed(2); if (q > 0) await sb.from("fridge_items").update({ qty: q }).eq("id", id); else await sb.from("fridge_items").delete().eq("id", id); await refresh(); };
  const removeFridge = async (id) => { await sb.from("fridge_items").delete().eq("id", id); await refresh(); };

  const todaysWorkouts = useMemo(() => workouts.filter((w) => w.date === todayKey()), [workouts]);
  const weightTrend = useMemo(() => { if (weights.length < 2) return null; const s = [...weights].sort((a, b) => a.date.localeCompare(b.date)); const r = s.slice(-6); const first = r[0], last = r[r.length - 1]; const days = (new Date(last.date) - new Date(first.date)) / 86400000 || 1; return { perWeek: ((last.weight - first.weight) / days) * 7 }; }, [weights]);
  const plan = useMemo(() => (profile ? nutritionPlan(profile, todaysWorkouts) : null), [profile, todaysWorkouts]);

  if (booting) return <Shell><Loading /></Shell>;
  if (!session) return <Shell><Auth /></Shell>;
  if (!dataReady) return <Shell><Loading /></Shell>;
  if (!profile) return <Shell><Onboarding onSave={saveProfile} /></Shell>;

  return (
    <Shell>
      <div style={{ paddingBottom: 86 }}>
        {tab === "oggi" && <Oggi plan={plan} profile={profile} todaysWorkouts={todaysWorkouts} workouts={workouts} weightTrend={weightTrend} weightLog={weights} sleepLog={sleepLog} fridge={fridge} goTab={setTab} />}
        {tab === "allen" && <Allenamenti workouts={workouts} addWorkout={addWorkout} delWorkout={delWorkout} weightKg={profile.weight} />}
        {tab === "frigo" && <Frigorifero fridge={fridge} addFridgeItem={addFridgeItem} updateFridgeQty={updateFridgeQty} removeFridge={removeFridge} />}
        {tab === "prog" && <Progressi weightLog={weights} saveWeight={saveWeight} sleepLog={sleepLog} saveSleep={saveSleep} workouts={workouts} profile={profile} />}
        {tab === "profilo" && <Profilo profile={profile} onSave={saveProfile} />}
      </div>
      <Nav tab={tab} setTab={setTab} />
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
